name: Build and deploy catalogs.rism.online

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      catalog:
        description: Catalog to build
        required: true
        default: all
        type: choice
        options:
          - all
          - AndP
          - BacCh
      deploy:
        description: Deploy to GitHub Pages (used only with catalog=all)
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: catalogs-pages
  cancel-in-progress: true

env:
  RUBY_VERSION: "3.2"
  CATALOGS_JSON: >
    [
      { "repo": "rism-digital/rism-catalog-andp",  "target": "AndP"  },
      { "repo": "rism-digital/rism-catalog-bacch", "target": "BacCh" }
    ]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should_deploy: ${{ steps.set-matrix.outputs.should_deploy }}

    steps:
      - name: Set matrix from env
        id: set-matrix
        shell: bash
        env:
          CATALOGS_JSON: ${{ env.CATALOGS_JSON }}
        run: |
          FULL_MATRIX="$CATALOGS_JSON"

          if [ "${{ github.event_name }}" = "push" ]; then
            MATRIX="$FULL_MATRIX"
            SHOULD_DEPLOY="true"
          else
            SELECTED='${{ inputs.catalog }}'

            if [ "$SELECTED" = "all" ]; then
              MATRIX="$FULL_MATRIX"
            else
              MATRIX="$(echo "$FULL_MATRIX" | jq --arg selected "$SELECTED" '[ .[] | select(.target == $selected) ]')"
            fi

            if [ "${{ inputs.deploy }}" = "true" ] && [ "$SELECTED" = "all" ]; then
              SHOULD_DEPLOY="true"
            else
              SHOULD_DEPLOY="false"
            fi
          fi

          if [ "$MATRIX" = "[]" ]; then
            echo "No catalog matched selection."
            exit 1
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$SHOULD_DEPLOY" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        catalog: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout catalog repository
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.catalog.repo }}
          path: source
          # Uncomment for private repos:
          # token: ${{ secrets.CATALOGS_READ_TOKEN }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: false

      - name: Install gems
        working-directory: source
        shell: bash
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Index
        working-directory: source
        run: bundle exec jekyll load-data
        env:
          JEKYLL_ENV: production

      - name: Build with Jekyll
        working-directory: source
        run: bundle exec jekyll build --baseurl "/${{ matrix.catalog.target }}"
        env:
          JEKYLL_ENV: production

      - name: Stage output
        shell: bash
        run: |
          mkdir -p "out/${{ matrix.catalog.target }}"
          cp -R source/_site/. "out/${{ matrix.catalog.target }}/"

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v4
        with:
          name: catalog-${{ matrix.catalog.target }}
          path: out/${{ matrix.catalog.target }}
          if-no-files-found: error

  deploy:
    needs: [prepare, build]
    if: needs.prepare.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download all catalog artifacts
        uses: actions/download-artifact@v4
        with:
          path: site-artifacts

      - name: Assemble final Pages site
        shell: bash
        run: |
          mkdir -p public
          for dir in site-artifacts/catalog-*; do
            name="$(basename "$dir" | sed 's/^catalog-//')"
            mkdir -p "public/$name"
            cp -R "$dir"/. "public/$name/"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
